name: miner-petta CI

on:
  push:
    branches:
      - petta-main
  pull_request:
    branches:
      - petta-main

jobs:
  setup-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Homebrew is preinstalled on macOS runners
      - name: Install SWI-Prolog and Python
        run: |
          brew update
          brew install swi-prolog python

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy==2.2.1 regex==2023.12.25 scipy==1.13.1

      - name: Run setup script
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Run PeTTa tests
        run: python3 scripts/run-tests.py
        env:
          PATH: ${{ github.workspace }}/PeTTa:${{ env.PATH }}
